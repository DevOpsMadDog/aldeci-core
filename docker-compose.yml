# ============================================
# ALdeci CTEM+ Platform — Docker Compose
# ============================================
# Quick start:      docker compose up          (API + UI always)
# With DTrack:      docker compose --profile dtrack up
# Index TrustGraph: docker compose run --rm trustgraph-init
# One-command:      bash scripts/quick-start.sh
# ============================================

services:
  aldeci:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${ALDECI_IMAGE:-aldeci:latest}
    container_name: aldeci-api
    ports:
      - "${ALDECI_PORT:-8000}:8000"
    environment:
      - FIXOPS_API_TOKEN=${FIXOPS_API_TOKEN:-aldeci-demo-token}
      - FIXOPS_JWT_SECRET=${FIXOPS_JWT_SECRET:-}
      - FIXOPS_MODE=enterprise
      - FIXOPS_DISABLE_RATE_LIMIT=${FIXOPS_DISABLE_RATE_LIMIT:-0}
      - FIXOPS_USE_COUNCIL=${FIXOPS_USE_COUNCIL:-0}
      - ALDECI_SEED_DEMO=${ALDECI_SEED_DEMO:-1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - aldeci-data:/app/data
      - aldeci-state:/app/.fixops_data
    networks:
      - aldeci-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  # New UI (React 19 + Vite 6) — always starts, no profile required
  aldeci-ui:
    build:
      context: suite-ui/aldeci-ui-new
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:${ALDECI_PORT:-8000}
    image: ${ALDECI_UI_IMAGE:-aldeci-ui:latest}
    container_name: aldeci-ui
    ports:
      - "${ALDECI_UI_PORT:-3000}:80"
    volumes:
      - ./docker/nginx-ui.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      aldeci:
        condition: service_healthy
    networks:
      - aldeci-net
    restart: unless-stopped

  # Demo data seeder (runs after API healthy — idempotent)
  seed-demo-data:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aldeci-seed-demo
    command: ["python", "scripts/seed_demo_data.py"]
    environment:
      - FIXOPS_API_TOKEN=${FIXOPS_API_TOKEN:-aldeci-demo-token}
      - FIXOPS_MODE=enterprise
    volumes:
      - aldeci-data:/app/data
      - aldeci-state:/app/.fixops_data
    depends_on:
      aldeci:
        condition: service_healthy
    networks:
      - aldeci-net
    profiles:
      - seed

  # TrustGraph indexer (one-shot: populates Knowledge Cores)
  trustgraph-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aldeci-trustgraph-init
    command: ["python", "-c", "from core.trustgraph_indexer import run_indexer; stats = run_indexer(); print(f'Indexed {stats[\"total\"]} entities')"]
    environment:
      - FIXOPS_API_TOKEN=${FIXOPS_API_TOKEN:-aldeci-demo-token}
      - FIXOPS_MODE=enterprise
    volumes:
      - aldeci-data:/app/data
    networks:
      - aldeci-net
    profiles:
      - init

  # OWASP Dependency-Track (optional — SBOM analysis)
  dtrack-api:
    image: dependencytrack/apiserver:4.12.3
    container_name: aldeci-dtrack-api
    ports:
      - "${DTRACK_API_PORT:-8080}:8080"
    volumes:
      - dtrack-data:/data
    networks:
      - aldeci-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    profiles:
      - dtrack
    deploy:
      resources:
        limits:
          memory: 4G

  dtrack-frontend:
    image: dependencytrack/frontend:4.12.3
    container_name: aldeci-dtrack-ui
    environment:
      - API_BASE_URL=http://localhost:${DTRACK_API_PORT:-8080}
    ports:
      - "${DTRACK_UI_PORT:-8081}:8080"
    depends_on:
      dtrack-api:
        condition: service_healthy
    networks:
      - aldeci-net
    restart: unless-stopped
    profiles:
      - dtrack

  # n8n — Workflow orchestration & connector bridge (400+ integrations)
  n8n:
    image: n8nio/n8n:latest
    container_name: aldeci-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_PUBLIC_API_SWAGGERUI_DISABLED=false
      - GENERIC_TIMEZONE=UTC
      - N8N_SECURE_COOKIE=false
      - N8N_API_KEY=${N8N_API_KEY:-}
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - aldeci-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  aldeci-net:
    driver: bridge

volumes:
  aldeci-data:
  aldeci-state:
  dtrack-data:
  n8n_data:

