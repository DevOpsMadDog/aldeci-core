name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Phase4 integration smoke
        run: |
          python -m pytest tests/test_phase4_integration.py -x --tb=short --timeout=15 -q -o "addopts="

      - name: Beast Mode canonical (13 phase files)
        run: |
          python -m pytest \
            tests/test_phase2_connectors.py tests/test_phase3_llm_council.py \
            tests/test_phase4_integration.py tests/test_phase5_enterprise.py \
            tests/test_phase6_streaming.py tests/test_phase7_analytics.py \
            tests/test_phase8_mcp.py tests/test_phase9_playbooks.py \
            tests/test_phase10_e2e.py tests/test_connector_framework.py \
            tests/test_trustgraph.py tests/test_pipeline_api.py \
            tests/test_persona_workflows.py \
            -x --tb=short --timeout=15 -q -o "addopts="
        continue-on-error: true

  ui:
    name: UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: suite-ui/aldeci-ui-new/package-lock.json

      - name: Install + build
        working-directory: suite-ui/aldeci-ui-new
        run: |
          npm ci
          npm run build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [python, ui]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
