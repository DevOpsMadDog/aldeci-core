# ALDECI Security Scan — GitLab CI Template
#
# Include this file in your .gitlab-ci.yml:
#
#   include:
#     - project: 'your-group/aldeci-templates'
#       file: 'gitlab-ci-aldeci-scan.yml'
#
# Or copy the aldeci-security-scan job definition directly.
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   ALDECI_API_URL   — e.g. https://aldeci.example.com
#   ALDECI_API_TOKEN — your ALDECI API key
#   ALDECI_POLICY_ID — policy UUID from POST /api/v1/cicd/policies

stages:
  - security-scan

aldeci-security-scan:
  stage: security-scan
  image: python:3.11-slim
  timeout: 15 minutes

  variables:
    ALDECI_POLICY_ID: ""     # Override in project-level CI variables
    ALDECI_BRANCH: $CI_COMMIT_REF_NAME
    ALDECI_SHA: $CI_COMMIT_SHA
    ALDECI_REPO: $CI_PROJECT_PATH

  before_script:
    - pip install requests --quiet

  script:
    - |
      python - <<'PYEOF'
      import json, os, sys, time, requests

      api_url   = os.environ["ALDECI_API_URL"].rstrip("/")
      api_token = os.environ["ALDECI_API_TOKEN"]
      policy_id = os.environ.get("ALDECI_POLICY_ID", "")
      repo      = os.environ.get("ALDECI_REPO", os.environ.get("CI_PROJECT_PATH", ""))
      branch    = os.environ.get("ALDECI_BRANCH", os.environ.get("CI_COMMIT_REF_NAME", "main"))
      sha       = os.environ.get("ALDECI_SHA", os.environ.get("CI_COMMIT_SHA", ""))

      headers = {"X-API-Key": api_token, "Content-Type": "application/json"}

      t0 = time.time()
      resp = requests.post(
          f"{api_url}/api/v1/cicd/scan",
          headers=headers,
          json={
              "repo": repo,
              "branch": branch,
              "commit_sha": sha,
              "policy_id": policy_id,
          },
          timeout=60,
      )

      if not resp.ok:
          print(f"ALDECI API error: {resp.status_code} {resp.text}", file=sys.stderr)
          sys.exit(1)

      result = resp.json()
      print(json.dumps(result, indent=2))

      action   = result.get("policy_action", "pass")
      critical = result.get("critical", 0)
      high     = result.get("high", 0)
      total    = result.get("findings_count", 0)

      # Write dotenv artifact for downstream jobs
      with open("aldeci.env", "w") as fh:
          fh.write(f"ALDECI_POLICY_ACTION={action}\n")
          fh.write(f"ALDECI_CRITICAL={critical}\n")
          fh.write(f"ALDECI_HIGH={high}\n")
          fh.write(f"ALDECI_FINDINGS={total}\n")
          fh.write(f"ALDECI_SCAN_ID={result.get('scan_id', '')}\n")

      # Save for MR note step
      with open("aldeci_scan_result.json", "w") as fh:
          json.dump(result, fh)

      print(f"\nPolicy action: {action.upper()}")
      print(f"Critical: {critical}  High: {high}  Total: {total}")

      if action == "block":
          print("\nERROR: ALDECI security policy gate BLOCKED this pipeline.", file=sys.stderr)
          sys.exit(1)
      elif action == "warn":
          print("\nWARNING: ALDECI security policy gate raised warnings.")
      else:
          print("\nOK: ALDECI security policy gate PASSED.")
      PYEOF

  after_script:
    - |
      # Post MR comment if this is a merge request pipeline
      if [ -n "$CI_MERGE_REQUEST_IID" ] && [ -f "aldeci_scan_result.json" ]; then
        python - <<'PYEOF'
      import json, os, sys, requests

      api_url       = os.environ.get("ALDECI_API_URL", "").rstrip("/")
      api_token     = os.environ.get("ALDECI_API_TOKEN", "")
      gitlab_token  = os.environ.get("GITLAB_TOKEN", os.environ.get("CI_JOB_TOKEN", ""))
      gitlab_url    = os.environ.get("CI_SERVER_URL", "https://gitlab.com")
      project_id    = os.environ.get("CI_PROJECT_ID", "")
      mr_iid        = os.environ.get("CI_MERGE_REQUEST_IID", "")

      if not (api_url and api_token and mr_iid):
          sys.exit(0)

      with open("aldeci_scan_result.json") as fh:
          result = json.load(fh)

      headers = {"X-API-Key": api_token, "Content-Type": "application/json"}
      resp = requests.post(
          f"{api_url}/api/v1/cicd/evaluate",
          headers=headers,
          json={"scan_result": result},
          timeout=30,
      )
      if not resp.ok:
          sys.exit(0)

      comment_body = resp.json().get("comment", "")
      if comment_body and gitlab_token:
          requests.post(
              f"{gitlab_url}/api/v4/projects/{project_id}/merge_requests/{mr_iid}/notes",
              headers={"PRIVATE-TOKEN": gitlab_token},
              json={"body": comment_body},
              timeout=15,
          )
      PYEOF
      fi

  artifacts:
    reports:
      dotenv: aldeci.env
    paths:
      - aldeci_scan_result.json
    expire_in: 7 days
    when: always

  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
